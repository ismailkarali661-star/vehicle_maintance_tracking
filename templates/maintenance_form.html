{% extends 'base.html' %}
{% block title %}Bakım Kaydı{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-8">
        <h4>{{ 'Bakım Düzenle' if action == 'edit' else 'Bakım Ekle' }} — {{ vehicle.brand }} {{ vehicle.model }}</h4>
        <form method="POST" class="mt-3">
            <div class="mb-3">
                <label class="form-label">Bakım Türü *</label>
                <input type="text" name="maintenance_type" class="form-control" required
                       value="{{ maintenance.maintenance_type if maintenance else '' }}">
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Tarih *</label>
                    <input type="date" name="date" class="form-control" required
                           value="{{ maintenance.date if maintenance else '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Km (bakım anında) *</label>
                    <input type="number" name="km_at_service" class="form-control" required
                           value="{{ maintenance.km_at_service if maintenance else '' }}">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Sonraki bakım km</label>
                    <input type="number" name="next_service_km" class="form-control"
                           value="{{ maintenance.next_service_km if maintenance else '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Sonraki bakım tarihi</label>
                    <input type="date" name="next_service_date" class="form-control"
                           value="{{ maintenance.next_service_date if maintenance else '' }}">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Maliyet (₺)</label>
                    <input type="number" step="0.01" name="cost" class="form-control"
                           value="{{ maintenance.cost if maintenance else '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Servis</label>
                    <input type="text" name="service_provider" class="form-control"
                           value="{{ maintenance.service_provider if maintenance else '' }}">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Notlar</label>
                <textarea name="notes" class="form-control" rows="3">{{ maintenance.notes if maintenance else '' }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary">Kaydet</button>
            <a href="{{ url_for('vehicle_detail', vehicle_id=vehicle.id) }}" class="btn btn-secondary">İptal</a>
        </form>
    </div>
</div>
{% endblock %}
