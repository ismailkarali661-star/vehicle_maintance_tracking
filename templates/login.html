{% extends "base.html" %}
{% block title %}Log In – AutoTrack{% endblock %}
{% block extra_styles %}
<style>
    .auth-wrapper { max-width: 420px; margin: 4rem auto; }
    .auth-title { font-family: 'Rajdhani', sans-serif; font-size: 2rem; font-weight: 700; margin-bottom: 0.25rem; }
    .auth-sub { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 2rem; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-title">Log In</div>
    <p class="auth-sub">Access your account.</p>
    <div class="card">
        <form method="POST">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="example@mail.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem;">Log In</button>
        </form>
    </div>
    <p style="text-align:center;margin-top:1.25rem;font-size:0.875rem;color:var(--text-muted);">
        Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
    </p>
</div>
{% endblock %}
